name: 🪐 Provisionamento Galáctico

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'

jobs:
  terraform:
    name: 🛸 Terraformando o universo
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: 🛸 Abduzindo o código...
        uses: actions/checkout@v4

      - name: 🔧 Configurando Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🔑 Configurando credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 🌌 Inicializando nave (terraform init)
        run: terraform init

      - name: 🔍 Verificando rota estelar (terraform plan)
        run: |
          terraform plan \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -var="auth_secret=${{ secrets.TF_VAR_AUTH_SECRET }}" \
            -var="key_pair_name=${{ secrets.TF_VAR_KEY_PAIR_NAME }}" \
            -var="github_repo=${{ secrets.TF_VAR_GITHUB_REPO }}" \
            -var="app_url=${{ secrets.TF_VAR_APP_URL }}" \
            -out=tfplan

      - name: 🚀 Aplicando missão (terraform apply)
        run: terraform apply -auto-approve tfplan

  deploy:
    name: 🛸 Enviando tripulação para a nave
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - name: 🛸 Abduzindo o código...
        uses: actions/checkout@v4

      - name: 🚀 Deployando na EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/fatal-muuudel
            git pull origin main
            set -a; source /etc/fatal-muuudel.env; set +a
            rm -rf node_modules .next
            npm ci
            npx prisma generate
            DATABASE_URL="${DATABASE_URL_MIGRATE:-$DATABASE_URL}" npx prisma migrate deploy
            npm run build
            pm2 describe fatal-muuudel > /dev/null 2>&1 \
              && pm2 reload fatal-muuudel --update-env \
              || pm2 start /opt/fatal-muuudel/node_modules/.bin/next --name fatal-muuudel -- start
            pm2 save

      - name: ✅ Missão cumprida
        if: success()
        run: echo "🛸 Deploy concluído! A frota está no ar em https://fatalmuuudel.com"
