name: 🪐 Provisionamento Galáctico

on:
  push:
    branches: [main]

jobs:
  terraform:
    name: 🛸 Terraformando o universo
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.check.outputs.infra_changed }}

    defaults:
      run:
        working-directory: infra

    steps:
      - name: 🛸 Abduzindo o código...
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: 🔍 Verificando se infra mudou
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^infra/'; then
            echo "infra_changed=true" >> $GITHUB_OUTPUT
          else
            echo "infra_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔧 Configurando Terraform
        if: steps.check.outputs.infra_changed == 'true'
        uses: hashicorp/setup-terraform@v3

      - name: 🔑 Configurando credenciais AWS
        if: steps.check.outputs.infra_changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: 🌌 Inicializando nave (terraform init)
        if: steps.check.outputs.infra_changed == 'true'
        run: terraform init

      - name: 🔍 Verificando rota estelar (terraform plan)
        if: steps.check.outputs.infra_changed == 'true'
        run: |
          terraform plan \
            -var="db_password=${{ secrets.TF_VAR_DB_PASSWORD }}" \
            -var="db_migrator_password=${{ secrets.TF_VAR_DB_MIGRATOR_PASSWORD }}" \
            -var="auth_secret=${{ secrets.TF_VAR_AUTH_SECRET }}" \
            -var="key_pair_name=${{ secrets.TF_VAR_KEY_PAIR_NAME }}" \
            -var="github_repo=${{ secrets.TF_VAR_GITHUB_REPO }}" \
            -var="app_url=${{ secrets.TF_VAR_APP_URL }}" \
            -out=tfplan

      - name: 🚀 Aplicando missão (terraform apply)
        if: steps.check.outputs.infra_changed == 'true'
        run: terraform apply -auto-approve tfplan

      - name: 🛸 Disparando deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
