name: 🚀 Deploy Intergaláctico

on:
  workflow_dispatch:

jobs:
  deploy:
    name: 🛸 Enviando tripulação para a nave
    runs-on: ubuntu-latest

    steps:
      - name: 🛸 Abduzindo o código...
        uses: actions/checkout@v4

      - name: 🚀 Deployando na EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/fatal-muuudel
            git checkout -- .
            git pull origin main
            set -a; source /etc/fatal-muuudel.env; set +a
            rm -rf node_modules .next
            npm ci
            npx prisma generate
            : "${DATABASE_URL_MIGRATE:?DATABASE_URL_MIGRATE não definida — adicione o secret TF_VAR_DB_MIGRATOR_PASSWORD e reprovisiione a EC2}"
            DATABASE_URL="$DATABASE_URL_MIGRATE" npx prisma migrate deploy
            npm run build
            pm2 describe fatal-muuudel > /dev/null 2>&1 \
              && pm2 reload fatal-muuudel --update-env \
              || pm2 start npm --name fatal-muuudel --cwd /opt/fatal-muuudel --update-env -- start
            pm2 save

      - name: ✅ Missão cumprida
        if: success()
        run: echo "🛸 Deploy concluído! A frota está no ar em https://fatalmuuudel.com"
