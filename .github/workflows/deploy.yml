name: 🚀 Deploy Intergaláctico

on:
  push:
    branches: [main]
    paths-ignore:
      - 'infra/**'

jobs:
  deploy:
    name: 🛸 Enviando tripulação para a nave
    runs-on: ubuntu-latest

    steps:
      - name: 🛸 Abduzindo o código...
        uses: actions/checkout@v4

      - name: 🚀 Deployando na EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo chown -R ec2-user:ec2-user /opt/fatal-muuudel
            cd /opt/fatal-muuudel
            git pull origin main
            export $(cat /etc/fatal-muuudel.env | xargs)
            rm -rf node_modules .next
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 describe fatal-muuudel > /dev/null 2>&1 \
              && pm2 reload fatal-muuudel --update-env \
              || pm2 start npm --name "fatal-muuudel" -- start

      - name: ✅ Missão cumprida
        if: success()
        run: echo "🛸 Deploy concluído! A frota está no ar em https://fatalmuuudel.com"
