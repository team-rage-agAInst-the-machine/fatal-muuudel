services:
  postgres:
    image: postgres:17-alpine
    container_name: fatal-muuudel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: fatal
      POSTGRES_PASSWORD: muuudel
      POSTGRES_DB: fatal_muuudel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fatal -d fatal_muuudel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
